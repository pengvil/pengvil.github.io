<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">Portfolio</title>

  <link rel="stylesheet" href="css/styles.css" />
  <script defer src="data/profile.js"></script>
  <script defer src="js/main.js"></script>
</head>

<body>
  <nav class="nav">
  <div class="nav-logo" id="navName">Your Name</div>

  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☀️</button>
</nav>

<main class="page">
  <!-- HERO -->
  <section class="hero" id="top">
    <div class="hero-grid">
      <div class="hero-left">
        <h1 class="hero-name" id="heroName">Your Name</h1>
        <p class="hero-role" id="heroRole">Your role</p>

        <div class="hero-actions">
          <a class="btn btn-fill" href="#contact">Get in touch</a>
          <a class="btn btn-outline" href="CV.pdf" download>Download CV</a>
        </div>
      </div>

      <div class="hero-right">
        <div class="photo-card">
          <img id="heroPhoto" class="photo-img" src="" alt="Profile photo">
        </div>
      </div>
    </div>
  </section>

  <!-- ABOUT -->
  <section id="about" class="section">
    <h2 class="section-title" id="aboutTitle">About Me</h2>
    <p class="section-text" id="aboutText">...</p>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="section">
    <h2 class="section-title">Contact</h2>
    <p class="section-text">Click an icon or send a message.</p>

    <div class="contact-row">
      <div class="socials">
        <a class="icon-btn" id="emailBtn" href="#" aria-label="Email">
          ✉️
        </a>
        <a class="icon-btn" id="githubBtn" href="#" target="_blank" rel="noreferrer" aria-label="GitHub">
          🐙
        </a>
        <a class="icon-btn" id="linkedinBtn" href="#" target="_blank" rel="noreferrer" aria-label="LinkedIn">
          💼
        </a>
      </div>

      <form class="contact-form" id="contactForm">
        <div class="form-grid">
          <input id="cName" type="text" placeholder="Your name" required>
          <input id="cEmail" type="email" placeholder="Your email" required>
        </div>
        <input id="cSubject" type="text" placeholder="Subject" required>
        <textarea id="cMessage" rows="5" placeholder="Write your message..." required></textarea>
        <button class="btn btn-fill" type="submit">Send Message →</button>
        <p class="form-hint">This opens your email app (works on GitHub Pages).</p>
      </form>
    </div>
  </section>

  <footer class="footer">
    <span id="footerCopy">© 2026 Your Name</span>
  </footer>
</main>
</body>
</html>
